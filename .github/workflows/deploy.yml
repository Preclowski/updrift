# Optional auto-deploy to Cloudflare on every push to main.
#
# To enable it on your copy of the repo, configure:
#   Secrets  → CLOUDFLARE_API_TOKEN   (API token with the "Edit Cloudflare Workers" template + D1 edit)
#   Secrets  → CLOUDFLARE_ACCOUNT_ID
#   Variables → D1_DATABASE_ID        (from `wrangler d1 create updrift-db`)
#
# Without the secrets the workflow runs but skips deployment, so CI stays green
# for people who only want to browse or contribute.

name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency: deploy-production

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check deploy credentials
        id: gate
        run: |
          if [ -z "${{ secrets.CLOUDFLARE_API_TOKEN }}" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice::CLOUDFLARE_API_TOKEN not configured - skipping deploy."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v4
        if: steps.gate.outputs.skip == 'false'
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        if: steps.gate.outputs.skip == 'false'
        run: npm ci

      - name: Inject D1 database id
        if: steps.gate.outputs.skip == 'false'
        run: |
          if [ -z "${{ vars.D1_DATABASE_ID }}" ]; then
            echo "::error::Set the D1_DATABASE_ID repository variable (from 'wrangler d1 create updrift-db')."
            exit 1
          fi
          sed -i 's/00000000-0000-0000-0000-000000000000/${{ vars.D1_DATABASE_ID }}/' wrangler.jsonc

      - name: Apply D1 migrations
        if: steps.gate.outputs.skip == 'false'
        run: npx wrangler d1 migrations apply DB --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy worker
        if: steps.gate.outputs.skip == 'false'
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
