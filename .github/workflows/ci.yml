name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate worker types
        # .dev.vars is git-ignored but wrangler types reads secret names from it,
        # so recreate it from the example to get the same Env type as local dev.
        run: cp .dev.vars.example .dev.vars && npm run types

      - name: Typecheck
        run: npm run typecheck

      - name: Tests (vitest on workerd)
        run: npm test
